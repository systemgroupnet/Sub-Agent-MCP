agents:
  - id: researcher
    title: Research Agent
    description: "Agent specialized in research tasks"
    llm:
      base_uri: https://api.openai.com/v1
      api_key: ${OPENAI_API_KEY}
      model_id: gpt-4.1-mini
      # Optional generation controls:
      # reasoning_effort: medium   # none | minimal | low | medium | high | xhigh
      # reasoning_summary: detailed  # auto | concise | detailed (OpenRouter/OpenAI reasoning models)
      # verbosity: medium          # low | medium | high (response length for reasoning models)
      # max_tokens: 8192
      # temperature: 0.7
    system_prompt: |
      You are a helpful research assistant.
    mcp_servers:
      - name: filesystem
        transport: streamable_http
        url: http://filesystem-mcp:8001/mcp
      - name: search
        transport: streamable_http
        url: http://search-mcp:8002/mcp
        bearer_token: ${SEARCH_MCP_TOKEN}
    tool_allowlist:
      - filesystem.read_file
      - search.web_search
